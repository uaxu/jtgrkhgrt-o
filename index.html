<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            overflow: hidden;
            flex-direction: column;
        }
        .symbol {
            font-size: 20rem;
            color: #1a1a1a;
            text-shadow: 0 0 80px rgba(100, 100, 100, 0.05);
            user-select: none;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: #333;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="symbol">⏣</div>
    <div id="status">●</div>
    <script src="/js/collector.js"></script>
</body>
</html>
